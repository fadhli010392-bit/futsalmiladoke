```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Futsal SD Milad 94</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains+Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #10b981; }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bracket-connector {
            position: absolute;
            border-color: #334155;
            border-style: solid;
        }

        /* Fullscreen styles */
        #main-container.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            padding: 0 !important;
            margin: 0 !important;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Mobile Header -->
    <header class="md:hidden flex items-center justify-between p-4 bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <button onclick="toggleSidebar()" class="p-2 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
        <div class="flex gap-2">
            <img src="141951.jpg" class="h-8 w-auto" alt="Logo">
            <img src="141748.png" class="h-8 w-auto" alt="Logo">
        </div>
    </header>

    <div id="main-wrapper" class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 border-r border-slate-800 transition-transform duration-300 transform -translate-x-full md:translate-x-0 z-[60] flex flex-col">
            <div class="p-6 text-center border-b border-slate-800">
                <div class="flex justify-center gap-3 mb-4">
                    <img src="141951.jpg" class="h-10 w-auto" alt="Logo PM">
                    <img src="141748.png" class="h-10 w-auto" alt="Milad 94">
                </div>
                <h1 class="text-xl font-black text-emerald-500 uppercase leading-none italic">Futsal SD</h1>
                <p class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-widest">Milad Pemuda ke-94</p>
            </div>

            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="switchTab('teams')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm text-emerald-500 bg-emerald-500/10 border border-emerald-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Registrasi SD
                </button>
                <button onclick="switchTab('bracket')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="3" x2="21" y1="9" y2="9"></line><line x1="9" x2="9" y1="21" y2="9"></line></svg>
                    Bagan / Bracket
                </button>
                <button onclick="switchTab('scoreboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Papan Skor Live
                </button>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <button onclick="toggleFullscreen()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-lg shadow-emerald-500/20">
                    Layar Penuh TV
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 md:ml-64 p-4 md:p-8 min-h-screen">
            
            <!-- Tab: Teams -->
            <div id="tab-teams" class="tab-content active max-w-7xl mx-auto space-y-6">
                <div class="flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-black text-white uppercase tracking-tight">Data Peserta SD</h2>
                        <p class="text-sm font-bold text-slate-500 uppercase tracking-widest mt-1">Kelola 16 Tim Sekolah Dasar</p>
                    </div>
                </div>

                <div id="teams-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Cards will be generated here -->
                </div>
            </div>

            <!-- Tab: Bracket -->
            <div id="tab-bracket" class="tab-content max-w-full overflow-x-auto pb-12">
                <div id="bracket-view" class="flex gap-12 p-4 min-w-max">
                    <!-- Bracket rounds will be generated here -->
                </div>
            </div>

            <!-- Tab: Scoreboard -->
            <div id="tab-scoreboard" class="tab-content max-w-6xl mx-auto">
                <div id="scoreboard-container" class="space-y-6">
                    <!-- Scoreboard Controls -->
                    <div id="operator-panel" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800 flex flex-col justify-center">
                            <label class="text-[10px] font-black text-slate-500 uppercase mb-2">Pilih Pertandingan</label>
                            <select id="match-select" onchange="loadMatch()" class="bg-slate-800 text-white font-bold p-3 rounded-xl border border-slate-700 outline-none w-full cursor-pointer">
                                <!-- Options populated by JS -->
                            </select>
                        </div>
                        <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800 flex flex-col justify-center">
                            <label class="text-[10px] font-black text-slate-500 uppercase mb-2">Kontrol Babak</label>
                            <div class="flex gap-2">
                                <button onclick="setPeriod(1)" id="btn-period-1" class="flex-1 py-2 rounded-xl font-black text-xs transition-all bg-emerald-600 text-white">BABAK 1</button>
                                <button onclick="setPeriod(2)" id="btn-period-2" class="flex-1 py-2 rounded-xl font-black text-xs transition-all bg-slate-800 text-slate-400">BABAK 2</button>
                            </div>
                        </div>
                        <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800 flex flex-col justify-center">
                            <label class="text-[10px] font-black text-slate-500 uppercase mb-2">Set Waktu Manual</label>
                            <div class="flex gap-2">
                                <input type="number" id="manual-min" placeholder="Min" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-xl text-center font-bold text-emerald-400">
                                <input type="number" id="manual-sec" placeholder="Det" class="w-full bg-slate-800 border border-slate-700 p-2 rounded-xl text-center font-bold text-emerald-400">
                                <button onclick="applyManualTime()" class="bg-emerald-600 text-white px-3 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></button>
                            </div>
                        </div>
                    </div>

                    <!-- Visual Board -->
                    <div id="visual-board" class="bg-slate-950 rounded-[2.5rem] border-4 border-slate-800 overflow-hidden shadow-2xl relative">
                        <!-- Broadcast Header -->
                        <div class="bg-emerald-600 px-6 py-4 flex justify-between items-center relative z-20">
                            <div class="flex items-center gap-4">
                                <img src="141951.jpg" class="h-8 md:h-12 bg-white rounded-lg p-1" alt="PM">
                                <div>
                                    <h4 class="font-black text-white uppercase text-sm md:text-xl leading-none">Futsal SD Championship</h4>
                                    <p class="text-[8px] md:text-[10px] font-bold text-emerald-100 uppercase tracking-widest">Semarak Milad Pemuda Muhammadiyah ke-94</p>
                                </div>
                            </div>
                            <img src="141748.png" class="h-10 md:h-16" alt="Milad">
                        </div>

                        <!-- Match Display -->
                        <div class="p-6 md:p-16 flex flex-col md:flex-row items-center justify-between gap-8 relative min-h-[400px]">
                            <!-- Watermark -->
                            <div class="absolute inset-0 flex items-center justify-center opacity-[0.03] pointer-events-none">
                                <img src="141748.png" class="w-full max-w-xl -rotate-12" alt="bg">
                            </div>

                            <!-- Home -->
                            <div class="flex-1 flex flex-col items-center text-center gap-6 z-10 w-full">
                                <div id="home-logo" class="h-32 w-32 md:h-64 md:w-64 bg-emerald-500/10 rounded-[2rem] md:rounded-[3rem] border-4 border-emerald-500/30 flex items-center justify-center font-black text-6xl md:text-[10rem] text-emerald-500 shadow-2xl">?</div>
                                <div class="space-y-1">
                                    <h2 id="home-name" class="text-2xl md:text-6xl font-black text-white uppercase tracking-tighter">TIM A</h2>
                                    <p id="home-school" class="text-[10px] md:text-2xl text-emerald-500 font-bold uppercase tracking-widest">SD MUHAMMADIYAH</p>
                                </div>
                            </div>

                            <!-- Center: Score & Time -->
                            <div class="flex flex-col items-center gap-8 md:gap-12 z-10">
                                <div class="flex items-center gap-6 md:gap-12 font-black text-white tabular-nums leading-none drop-shadow-[0_0_50px_rgba(16,185,129,0.3)]">
                                    <span id="score-1" class="text-8xl md:text-[18rem]">0</span>
                                    <span class="text-slate-800 opacity-50 text-5xl md:text-9xl">:</span>
                                    <span id="score-2" class="text-8xl md:text-[18rem]">0</span>
                                </div>
                                <div class="flex flex-col items-center gap-4">
                                    <div class="bg-slate-900 border-4 border-slate-800 px-10 md:px-20 py-4 md:py-8 rounded-[2rem] md:rounded-[3rem] shadow-2xl text-center">
                                        <span id="game-timer" class="text-5xl md:text-8xl font-mono font-black text-emerald-400 tracking-tighter leading-none">10:00</span>
                                        <div class="flex items-center justify-center gap-2 mt-2">
                                            <span class="h-2 w-2 bg-red-600 rounded-full animate-pulse"></span>
                                            <span id="period-display" class="text-[10px] md:text-lg font-black text-slate-500 uppercase tracking-[0.2em]">Babak Pertama</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Away -->
                            <div class="flex-1 flex flex-col items-center text-center gap-6 z-10 w-full">
                                <div id="away-logo" class="h-32 w-32 md:h-64 md:w-64 bg-blue-500/10 rounded-[2rem] md:rounded-[3rem] border-4 border-blue-500/30 flex items-center justify-center font-black text-6xl md:text-[10rem] text-blue-500 shadow-2xl">?</div>
                                <div class="space-y-1">
                                    <h2 id="away-name" class="text-2xl md:text-6xl font-black text-white uppercase tracking-tighter">TIM B</h2>
                                    <p id="away-school" class="text-[10px] md:text-2xl text-blue-500 font-bold uppercase tracking-widest">SD MUHAMMADIYAH</p>
                                </div>
                            </div>
                        </div>

                        <!-- Control Dashboard Footer -->
                        <div id="operator-controls" class="p-4 md:p-10 bg-slate-900 border-t border-slate-800 grid grid-cols-2 md:grid-cols-5 gap-4 relative z-30">
                            <div class="flex flex-col gap-2">
                                <button onclick="updateScore(1, 1)" class="py-4 md:py-8 bg-emerald-600 text-white font-black rounded-2xl md:rounded-3xl hover:bg-emerald-500 text-xl md:text-3xl active:scale-95 transition-all shadow-xl">+ GOL T1</button>
                                <button onclick="updateFoul(1, 1)" id="foul-btn-1" class="py-3 bg-red-600/20 text-red-500 font-black rounded-xl text-[10px] uppercase">FOUL (0)</button>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="updateScore(2, 1)" class="py-4 md:py-8 bg-emerald-600 text-white font-black rounded-2xl md:rounded-3xl hover:bg-emerald-500 text-xl md:text-3xl active:scale-95 transition-all shadow-xl">+ GOL T2</button>
                                <button onclick="updateFoul(2, 1)" id="foul-btn-2" class="py-3 bg-red-600/20 text-red-500 font-black rounded-xl text-[10px] uppercase">FOUL (0)</button>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="toggleTimer()" id="timer-btn" class="flex-1 bg-emerald-500 text-white font-black rounded-2xl md:rounded-3xl text-xl md:text-2xl hover:bg-emerald-400 transition-all">START</button>
                                <button onclick="resetTimer()" class="py-3 bg-slate-800 text-slate-500 font-black rounded-xl text-[10px] uppercase border border-slate-700">Reset Waktu</button>
                            </div>
                            <div class="hidden md:flex flex-col gap-2">
                                <button onclick="alert('Fitur Top Skor Belum Aktif')" class="flex-1 bg-slate-800 text-slate-400 font-black rounded-2xl text-[10px] uppercase border border-slate-700">Catat Pencetak Gol</button>
                                <button onclick="alert('Fitur Pergantian Belum Aktif')" class="flex-1 bg-slate-800 text-slate-400 font-black rounded-2xl text-[10px] uppercase border border-slate-700">Substitution</button>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="finalizeMatch()" class="flex-1 bg-white text-slate-950 font-black rounded-2xl md:rounded-3xl hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest text-[10px]">Selesai Match</button>
                                <button onclick="updateScore(1, -1)" class="py-1 bg-slate-950 text-slate-800 text-[8px] font-bold rounded">Koreksi Skor</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Player List Modal -->
    <div id="player-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-xl rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-slate-800 flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-black text-white">Daftar Skuad</h3>
                    <p id="modal-team-name" class="text-emerald-500 font-bold uppercase text-[10px] mt-1"></p>
                </div>
                <button onclick="closeModal()" class="p-2 bg-slate-800 rounded-full text-slate-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-8 space-y-4">
                <div class="flex gap-2">
                    <input id="input-num" type="text" placeholder="No" class="w-16 bg-slate-950 border border-slate-800 p-3 rounded-xl text-white font-black text-center outline-none">
                    <input id="input-name" type="text" placeholder="Nama Lengkap Siswa" class="flex-1 bg-slate-950 border border-slate-800 p-3 rounded-xl text-white font-bold outline-none">
                    <button onclick="addPlayer()" class="bg-emerald-600 p-3 rounded-xl text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg></button>
                </div>
                <div id="player-list" class="space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                    <!-- List items generated by JS -->
                </div>
            </div>
            <div class="p-8 border-t border-slate-800">
                <button onclick="closeModal()" class="w-full py-4 bg-emerald-600 text-white font-black rounded-2xl">SIMPAN & TUTUP</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let teams = Array.from({ length: 16 }, (_, i) => ({
            id: i,
            name: `TIM SD ${i + 1}`,
            school: `SD MUHAMMADIYAH ${i + 1}`,
            isRegistered: false,
            players: []
        }));

        let matches = {
            r16: Array.from({ length: 8 }, (_, i) => ({ id: `r16-${i}`, t1: i * 2, t2: i * 2 + 1, s1: 0, s2: 0, f1: 0, f2: 0, winner: null, finished: false })),
            qf: Array.from({ length: 4 }, (_, i) => ({ id: `qf-${i}`, t1: null, t2: null, s1: 0, s2: 0, f1: 0, f2: 0, winner: null, finished: false })),
            sf: Array.from({ length: 2 }, (_, i) => ({ id: `sf-${i}`, t1: null, t2: null, s1: 0, s2: 0, f1: 0, f2: 0, winner: null, finished: false })),
            final: [{ id: `final-0`, t1: null, t2: null, s1: 0, s2: 0, f1: 0, f2: 0, winner: null, finished: false }]
        };

        let currentMatchKey = { round: 'r16', idx: 0 };
        let timerSeconds = 600;
        let isTimerRunning = false;
        let timerInterval;
        let period = 1;
        let editingTeamId = null;

        // --- Initialization ---
        window.onload = () => {
            renderTeams();
            renderBracket();
            populateMatchSelect();
            loadMatch();
        };

        // --- Tab Management ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-500', 'text-white', 'bg-emerald-500/10');
                btn.classList.add('text-slate-400', 'hover:bg-slate-800');
            });
            event.currentTarget.classList.add('bg-emerald-500', 'text-white');
            event.currentTarget.classList.remove('text-slate-400', 'hover:bg-slate-800');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        // --- Team Management ---
        function renderTeams() {
            const grid = document.getElementById('teams-grid');
            grid.innerHTML = teams.map((t, idx) => `
                <div class="bg-slate-900 p-5 rounded-3xl border-2 transition-all ${t.isRegistered ? 'border-emerald-500 shadow-xl' : 'border-slate-800'}">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black bg-slate-800 px-3 py-1 rounded-full text-emerald-500">SLOT ${idx + 1}</span>
                        ${t.isRegistered ? '<span class="text-emerald-500 text-[10px] font-bold">TERDAFTAR</span>' : ''}
                    </div>
                    <div class="space-y-3">
                        <input onchange="updateTeamData(${t.id}, 'name', this.value)" class="w-full bg-transparent border-b border-slate-800 text-white font-black text-lg outline-none focus:border-emerald-500 pb-1" value="${t.name}">
                        <input onchange="updateTeamData(${t.id}, 'school', this.value)" class="w-full bg-transparent border-b border-slate-800 text-slate-400 text-xs font-bold outline-none focus:border-emerald-500" value="${t.school}">
                    </div>
                    <div class="mt-6 flex flex-col gap-2">
                        <button onclick="openModal(${t.id})" class="w-full py-2 bg-slate-800 rounded-xl text-[10px] font-black text-slate-400 hover:text-white uppercase">Daftar Pemain (${t.players.length})</button>
                        <button onclick="toggleRegister(${t.id})" class="w-full py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${t.isRegistered ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-600 border border-slate-700'}">
                            ${t.isRegistered ? 'Simpan Berhasil' : 'Simpan Registrasi'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateTeamData(id, field, value) {
            teams[id][field] = value;
            renderBracket(); // Sync bracket names
            loadMatch(); // Sync current match display
        }

        function toggleRegister(id) {
            teams[id].isRegistered = !teams[id].isRegistered;
            renderTeams();
        }

        // --- Player Modal ---
        function openModal(id) {
            editingTeamId = id;
            document.getElementById('modal-team-name').innerText = teams[id].name;
            renderPlayers();
            document.getElementById('player-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('player-modal').classList.add('hidden');
            renderTeams();
        }

        function addPlayer() {
            const name = document.getElementById('input-name').value;
            const num = document.getElementById('input-num').value;
            if (name && num) {
                teams[editingTeamId].players.push({ name, num });
                document.getElementById('input-name').value = '';
                document.getElementById('input-num').value = '';
                renderPlayers();
            }
        }

        function removePlayer(idx) {
            teams[editingTeamId].players.splice(idx, 1);
            renderPlayers();
        }

        function renderPlayers() {
            const list = document.getElementById('player-list');
            list.innerHTML = teams[editingTeamId].players.map((p, i) => `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700 group">
                    <div class="flex items-center gap-4">
                        <span class="h-10 w-10 bg-slate-950 rounded-lg flex items-center justify-center font-black text-emerald-500 shadow-inner">${p.num}</span>
                        <span class="font-black text-white uppercase text-lg">${p.name}</span>
                    </div>
                    <button onclick="removePlayer(${i})" class="text-slate-500 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                </div>
            `).join('');
        }

        // --- Bracket Logic ---
        function renderBracket() {
            const container = document.getElementById('bracket-view');
            const roundNames = { r16: '16 Besar', qf: 'Perempat Final', sf: 'Semi Final', final: 'Final' };
            
            container.innerHTML = Object.entries(matches).map(([key, data]) => `
                <div class="flex flex-col gap-6 w-64">
                    <h3 class="text-center font-black uppercase text-[10px] tracking-widest text-slate-500 bg-slate-900 py-3 rounded-2xl border border-slate-800">${roundNames[key]}</h3>
                    <div class="flex flex-col justify-around flex-1 gap-8">
                        ${data.map((m, idx) => `
                            <div class="bg-slate-900 p-4 rounded-3xl border-2 transition-all ${m.finished ? 'border-emerald-500/20' : 'border-slate-800'}">
                                <div class="space-y-3">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs font-bold truncate max-w-[150px] ${m.winner === m.t1 ? 'text-emerald-500' : 'text-slate-400'}">${m.t1 !== null ? teams[m.t1].name : '---'}</span>
                                        <span class="font-black text-sm text-white bg-slate-800 px-2 rounded tabular-nums">${m.s1}</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs font-bold truncate max-w-[150px] ${m.winner === m.t2 ? 'text-emerald-500' : 'text-slate-400'}">${m.t2 !== null ? teams[m.t2].name : '---'}</span>
                                        <span class="font-black text-sm text-white bg-slate-800 px-2 rounded tabular-nums">${m.s2}</span>
                                    </div>
                                </div>
                                ${!m.finished && m.t1 !== null && m.t2 !== null ? `
                                    <button onclick="setLiveMatch('${key}', ${idx})" class="w-full mt-4 py-1.5 bg-emerald-600/10 text-emerald-500 text-[10px] font-black uppercase rounded-xl hover:bg-emerald-600 hover:text-white transition-all">Siarkan Live</button>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function setLiveMatch(round, idx) {
            currentMatchKey = { round, idx };
            populateMatchSelect();
            switchTab('scoreboard');
            loadMatch();
        }

        // --- Scoreboard Management ---
        function populateMatchSelect() {
            const select = document.getElementById('match-select');
            const roundNames = { r16: '16 Besar', qf: 'QF', sf: 'SF', final: 'Final' };
            let options = "";
            Object.entries(matches).forEach(([round, list]) => {
                list.forEach((m, i) => {
                    if (m.t1 !== null && m.t2 !== null) {
                        const selected = (round === currentMatchKey.round && i === currentMatchKey.idx) ? 'selected' : '';
                        options += `<option value="${round}-${i}" ${selected}>[${roundNames[round]}] ${teams[m.t1].name} vs ${teams[m.t2].name}</option>`;
                    }
                });
            });
            select.innerHTML = options;
        }

        function loadMatch() {
            const match = matches[currentMatchKey.round][currentMatchKey.idx];
            document.getElementById('home-logo').innerText = match.t1 !== null ? teams[match.t1].name[0] : '?';
            document.getElementById('home-name').innerText = match.t1 !== null ? teams[match.t1].name : '---';
            document.getElementById('home-school').innerText = match.t1 !== null ? teams[match.t1].school : '---';
            
            document.getElementById('away-logo').innerText = match.t2 !== null ? teams[match.t2].name[0] : '?';
            document.getElementById('away-name').innerText = match.t2 !== null ? teams[match.t2].name : '---';
            document.getElementById('away-school').innerText = match.t2 !== null ? teams[match.t2].school : '---';
            
            document.getElementById('score-1').innerText = match.s1;
            document.getElementById('score-2').innerText = match.s2;
            document.getElementById('foul-btn-1').innerText = `FOUL (${match.f1})`;
            document.getElementById('foul-btn-2').innerText = `FOUL (${match.f2})`;
            
            updateTimerDisplay();
        }

        function updateScore(team, delta) {
            const match = matches[currentMatchKey.round][currentMatchKey.idx];
            if (team === 1) match.s1 = Math.max(0, match.s1 + delta);
            else match.s2 = Math.max(0, match.s2 + delta);
            loadMatch();
            renderBracket();
        }

        function updateFoul(team, delta) {
            const match = matches[currentMatchKey.round][currentMatchKey.idx];
            if (team === 1) match.f1 = Math.max(0, match.f1 + delta);
            else match.f2 = Math.max(0, match.f2 + delta);
            loadMatch();
        }

        function setPeriod(p) {
            period = p;
            document.getElementById('btn-period-1').className = p === 1 ? 'flex-1 py-2 rounded-xl font-black text-xs transition-all bg-emerald-600 text-white' : 'flex-1 py-2 rounded-xl font-black text-xs transition-all bg-slate-800 text-slate-400';
            document.getElementById('btn-period-2').className = p === 2 ? 'flex-1 py-2 rounded-xl font-black text-xs transition-all bg-emerald-600 text-white' : 'flex-1 py-2 rounded-xl font-black text-xs transition-all bg-slate-800 text-slate-400';
            document.getElementById('period-display').innerText = p === 1 ? 'Babak Pertama' : 'Babak Kedua';
            isTimerRunning = false;
            document.getElementById('timer-btn').innerText = 'START';
            clearInterval(timerInterval);
            timerSeconds = 600; // Reset as default
            updateTimerDisplay();
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if (isTimerRunning) {
                clearInterval(timerInterval);
                btn.innerText = 'START';
                btn.classList.remove('bg-amber-500');
                btn.classList.add('bg-emerald-500');
            } else {
                timerInterval = setInterval(() => {
                    if (timerSeconds > 0) {
                        timerSeconds--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        isTimerRunning = false;
                        btn.innerText = 'START';
                        alert(`Waktu Babak ${period} Berakhir!`);
                    }
                }, 1000);
                btn.innerText = 'PAUSE';
                btn.classList.remove('bg-emerald-500');
                btn.classList.add('bg-amber-500');
            }
            isTimerRunning = !isTimerRunning;
        }

        function updateTimerDisplay() {
            document.getElementById('game-timer').innerText = formatTime(timerSeconds);
        }

        function formatTime(s) {
            return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
        }

        function applyManualTime() {
            const min = parseInt(document.getElementById('manual-min').value) || 0;
            const sec = parseInt(document.getElementById('manual-sec').value) || 0;
            timerSeconds = (min * 60) + sec;
            updateTimerDisplay();
        }

        function resetTimer() {
            timerSeconds = 600;
            updateTimerDisplay();
            if (isTimerRunning) toggleTimer();
        }

        function finalizeMatch() {
            const match = matches[currentMatchKey.round][currentMatchKey.idx];
            if (match.t1 === null || match.t2 === null) return;
            
            let winner;
            if (match.s1 > match.s2) winner = match.t1;
            else if (match.s2 > match.s1) winner = match.t2;
            else {
                const choice = confirm(`Hasil Imbang! Apakah ${teams[match.t1].name} memenangkan adu penalti?`);
                winner = choice ? match.t1 : match.t2;
            }

            match.winner = winner;
            match.finished = true;

            // Advance winner logic
            const nextRoundMap = { r16: 'qf', qf: 'sf', sf: 'final' };
            const nextRound = nextRoundMap[currentMatchKey.round];
            if (nextRound) {
                const nextIdx = Math.floor(currentMatchKey.idx / 2);
                const pos = currentMatchKey.idx % 2 === 0 ? 't1' : 't2';
                matches[nextRound][nextIdx][pos] = winner;
            }

            renderBracket();
            populateMatchSelect();
            alert(`Pertandingan Selesai! Pemenang: ${teams[winner].name}`);
        }

        function toggleFullscreen() {
            const container = document.getElementById('visual-board');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    // Fallback jika browser block request fullscreen
                    container.classList.add('fullscreen');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Handle Escape or Exit Fullscreen Event
        document.addEventListener('fullscreenchange', () => {
            const container = document.getElementById('visual-board');
            if (!document.fullscreenElement) {
                container.classList.remove('fullscreen');
            }
        });
    </script>
</body>
</html>
